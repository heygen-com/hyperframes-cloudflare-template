<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI 3D Reveal — Hyperframes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #07070f;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }

      .comp-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="ui-3d-reveal-main"
      data-width="1920"
      data-height="1080"
      data-duration="13"
    >
      <div
        id="ui-3d-reveal-layer"
        class="comp-layer"
        data-composition-id="ui-3d-reveal"
        data-composition-src="compositions/ui-3d-reveal.html"
        data-start="0"
        data-duration="13"
        data-track-index="1"
      ></div>

      <script>
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        window.__timelines['ui-3d-reveal-main'] = tl;
      </script>
    </div>
  </body>
</html>
